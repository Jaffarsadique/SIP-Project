<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Note - NexusNotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i data-lucide="book-open"></i> NexusNotes
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Discover</a>
            </div>
            <div class="nav-actions flex gap-4 items-center">
                <a href="profile.html" class="btn btn-outline">Profile</a>
            </div>
        </div>
    </nav>

    <main class="container" style="max-width: 800px; padding: 4rem 1.5rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Upload a Note</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Share your knowledge with the community and earn rewards.</p>

        <form id="uploadForm" class="card">
            <div class="upload-area" id="uploadArea" style="margin-bottom: 2rem;">
                <i data-lucide="upload-cloud" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1rem;"></i>
                <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem;">Click or drag file to this area to upload</h3>
                <p id="uploadText" style="color: var(--text-muted);">Support for a single or bulk upload. Strictly prohibit from uploading company data or other band files.</p>
                <input type="file" id="fileInput" style="display: none;" accept=".pdf,.doc,.docx,.txt">
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Note Title</label>
                    <input type="text" class="form-control" placeholder="e.g. Advanced Calculus Midterm Review" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Subject Category</label>
                    <select class="form-control" required>
                        <option value="">Select a subject...</option>
                        <option value="cs">Computer Science</option>
                        <option value="math">Mathematics</option>
                        <option value="med">Medicine</option>
                        <option value="law">Law</option>
                        <option value="biz">Business</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Price Model</label>
                    <select class="form-control" required>
                        <option value="free">Free (Community Contribution)</option>
                        <option value="paid">Premium (Set Price)</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Description & AI Summary</label>
                    <textarea class="form-control" rows="4" placeholder="Briefly describe what these notes cover. (Our AI will automatically generate a summary from the PDF content as well)"></textarea>
                </div>
            </div>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <a href="index.html" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Publish Note</button>
            </div>
        </form>
    </main>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
