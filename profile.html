<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - NexusNotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i data-lucide="book-open"></i> NexusNotes
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Discover</a>
            </div>
            <div class="nav-actions flex gap-4 items-center">
                <a href="upload.html" class="btn btn-outline">Upload Note</a>
                <button class="btn btn-outline" style="border-color: #EF4444; color: #EF4444;" onclick="window.location.href='index.html'">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="profile-header">
            <div class="avatar">JM</div>
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 0.25rem;">Johnathan Miller</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 1rem;">Computer Science Student @ MIT</p>
                <div class="flex gap-4">
                    <div style="background: rgba(79, 70, 229, 0.1); color: var(--primary); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600;">
                        Pro Member
                    </div>
                    <div style="background: var(--surface); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
                        <i data-lucide="star" style="width: 16px; color: #F59E0B; fill: currentColor;"></i> 4.9 Creator Rating
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 2rem 0;">
            <div style="display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border);">
                <button class="btn" style="background: transparent; border: none; border-bottom: 2px solid var(--primary); border-radius: 0; color: var(--primary); padding: 0.5rem 0;">My Uploads (3)</button>
                <button class="btn" style="background: transparent; border: none; color: var(--text-muted); padding: 0.5rem 0;">Saved Notes (12)</button>
                <button class="btn" style="background: transparent; border: none; color: var(--text-muted); padding: 0.5rem 0;">Earnings</button>
            </div>

            <!-- Stats Overview -->
            <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 3rem;">
                <div class="card flex items-center gap-4">
                    <div style="width: 48px; height: 48px; border-radius: 12px; background: rgba(16, 185, 129, 0.1); color: #10B981; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="eye"></i>
                    </div>
                    <div>
                        <p style="color: var(--text-muted); font-size: 0.875rem;">Total Views</p>
                        <p style="font-size: 1.5rem; font-weight: 700;">12,450</p>
                    </div>
                </div>
                <div class="card flex items-center gap-4">
                    <div style="width: 48px; height: 48px; border-radius: 12px; background: rgba(79, 70, 229, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="download"></i>
                    </div>
                    <div>
                        <p style="color: var(--text-muted); font-size: 0.875rem;">Total Downloads</p>
                        <p style="font-size: 1.5rem; font-weight: 700;">3,820</p>
                    </div>
                </div>
                <div class="card flex items-center gap-4">
                    <div style="width: 48px; height: 48px; border-radius: 12px; background: rgba(245, 158, 11, 0.1); color: #F59E0B; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="dollar-sign"></i>
                    </div>
                    <div>
                        <p style="color: var(--text-muted); font-size: 0.875rem;">Revenue</p>
                        <p style="font-size: 1.5rem; font-weight: 700;">$420.50</p>
                    </div>
                </div>
            </div>

            <div class="notes-grid" style="padding: 0;" id="notesContainer">
                <!-- Notes will be populated by app.js rendering mockNotes initially just to show something -->
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        // Just to show some notes on the profile page
        document.addEventListener('DOMContentLoaded', () => {
            renderNotes(mockNotes.slice(0, 3));
        });
    </script>
</body>
</html>
